<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>量化交易看板</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>量化交易看板</h1>
        <p id="subtitle">SQLite 本地研究工作台</p>
      </div>
      <div class="status-strip">
        <span id="runtimeBadge" class="badge badge-neutral">运行状态</span>
        <span id="generatedAt" class="muted">--</span>
      </div>
    </header>

    <main class="shell">
      <section class="toolbar" aria-label="筛选条件">
        <label>
          市场
          <select id="market">
            <option value="spot">现货</option>
            <option value="perpetual">永续合约</option>
          </select>
        </label>
        <label>
          交易对
          <select id="symbol">
            <option>BTCUSDT</option>
            <option>ETHUSDT</option>
            <option>BNBUSDT</option>
            <option>SOLUSDT</option>
          </select>
        </label>
        <label>
          周期
          <select id="interval">
            <option>1h</option>
            <option>15m</option>
            <option>4h</option>
            <option>1d</option>
          </select>
        </label>
        <button id="refresh" type="button">刷新</button>
      </section>

      <section id="warnings" class="warnings" hidden></section>

      <section class="kpi-grid" aria-label="交易概览">
        <article class="metric">
          <span>账户权益</span>
          <strong id="accountEquity">--</strong>
          <small id="accountMeta">--</small>
        </article>
        <article class="metric">
          <span>持仓盈亏</span>
          <strong id="positionPnL">--</strong>
          <small id="positionPnLMeta">--</small>
        </article>
        <article class="metric">
          <span>当前持仓</span>
          <strong id="openPositionCount">--</strong>
          <small id="positionSummary">--</small>
        </article>
        <article class="metric">
          <span>最近回测</span>
          <strong id="latestBacktestReturn">--</strong>
          <small id="latestBacktestMeta">--</small>
        </article>
      </section>

      <section class="grid-main">
        <article class="panel">
          <div class="panel-head">
            <h2>当前持仓</h2>
            <span id="positionUpdatedAt" class="pill">--</span>
          </div>
          <div id="positionRows" class="position-list"></div>
        </article>

        <aside class="side-stack">
          <article class="panel">
            <div class="panel-head">
              <h2>买了啥 / 最新动作</h2>
            </div>
            <div id="tradeActionRows" class="rows action-list"></div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <h2>策略逻辑</h2>
            </div>
            <div class="strategy-compact">
              <strong id="strategyName">--</strong>
              <p id="strategyPlainText">--</p>
              <div class="strategy-mini-grid">
                <span><em>买入</em><strong id="buyRule">--</strong></span>
                <span><em>卖出</em><strong id="sellRule">--</strong></span>
                <span><em>信号</em><strong id="currentSignal">--</strong></span>
                <span><em>限制</em><strong id="strategyLimit">--</strong></span>
              </div>
              <p id="signalReason">--</p>
            </div>
          </article>
        </aside>
      </section>

      <section class="grid-two">
        <article class="panel">
          <div class="panel-head">
            <h2>回测结果</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Run ID</th>
                  <th>策略</th>
                  <th>市场</th>
                  <th>交易对</th>
                  <th>总收益</th>
                  <th>买入持有</th>
                  <th>超额收益</th>
                  <th>回撤</th>
                  <th>交易数</th>
                </tr>
              </thead>
              <tbody id="backtestRows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>回测入库日志</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Run ID</th>
                  <th>入库时间</th>
                  <th>策略</th>
                  <th>收益</th>
                  <th>超额</th>
                  <th>回撤</th>
                  <th>交易数</th>
                </tr>
              </thead>
              <tbody id="backtestLogRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="panel db-browser" aria-label="数据库浏览器">
        <div class="panel-head">
          <div>
            <h2>数据库浏览器</h2>
            <p id="dbTableMeta">选择表查看 data.db 最近记录</p>
          </div>
          <div class="db-controls">
            <select id="dbTable">
              <option value="backtest_runs">backtest_runs</option>
              <option value="positions">positions</option>
              <option value="balances">balances</option>
              <option value="orders">orders</option>
              <option value="signals">signals</option>
              <option value="performance_snapshots">performance_snapshots</option>
              <option value="candles">candles</option>
              <option value="funding_rates">funding_rates</option>
              <option value="mark_prices">mark_prices</option>
              <option value="risk_events">risk_events</option>
              <option value="strategy_runs">strategy_runs</option>
              <option value="candle_snapshots">candle_snapshots</option>
            </select>
            <button id="loadTable" type="button">查看</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="dbTablePreview">
            <thead id="dbTableHead"></thead>
            <tbody id="dbTableRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
