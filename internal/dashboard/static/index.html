<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>量化交易看板</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>量化交易看板</h1>
        <p id="subtitle">SQLite 本地研究工作台</p>
      </div>
      <div class="status-strip">
        <span id="runtimeBadge" class="badge badge-neutral">运行状态</span>
        <span id="generatedAt" class="muted">--</span>
      </div>
    </header>

    <main class="shell">
      <section class="toolbar" aria-label="筛选条件">
        <label>
          市场
          <select id="market">
            <option value="spot">现货</option>
            <option value="perpetual">永续合约</option>
          </select>
        </label>
        <label>
          交易对
          <select id="symbol">
            <option>BTCUSDT</option>
            <option>ETHUSDT</option>
            <option>BNBUSDT</option>
            <option>SOLUSDT</option>
          </select>
        </label>
        <label>
          周期
          <select id="interval">
            <option>1h</option>
            <option>15m</option>
            <option>4h</option>
            <option>1d</option>
          </select>
        </label>
        <button id="refresh" type="button">刷新</button>
      </section>

      <section id="warnings" class="warnings" hidden></section>

      <section class="kpi-grid" aria-label="核心指标">
        <article class="metric">
          <span>最新收盘价</span>
          <strong id="latestClose">--</strong>
          <small id="latestMeta">--</small>
        </article>
        <article class="metric">
          <span>回测次数</span>
          <strong id="runCount">--</strong>
          <small id="bestBacktest">--</small>
        </article>
        <article class="metric">
          <span>风控事件</span>
          <strong id="riskCount">--</strong>
          <small id="lastRisk">--</small>
        </article>
        <article class="metric">
          <span>模拟权益</span>
          <strong id="paperEquity">--</strong>
          <small id="paperPnL">--</small>
        </article>
      </section>

      <section class="layout">
        <article class="panel chart-panel">
          <div class="panel-head">
            <div>
              <h2>价格走势</h2>
              <p id="chartLabel">--</p>
            </div>
            <span id="seriesCount" class="pill">0 个点</span>
          </div>
          <svg id="priceChart" class="chart" viewBox="0 0 900 320" role="img" aria-label="价格走势图"></svg>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>数据覆盖</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>市场</th>
                  <th>交易对</th>
                  <th>周期</th>
                  <th>K 线数</th>
                  <th>最新收盘价</th>
                </tr>
              </thead>
              <tbody id="coverageRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="grid-two">
        <article class="panel">
          <div class="panel-head">
            <h2>回测结果</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>策略</th>
                  <th>市场</th>
                  <th>交易对</th>
                  <th>总收益</th>
                  <th>超额收益</th>
                  <th>回撤</th>
                </tr>
              </thead>
              <tbody id="backtestRows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>订单与风控</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>交易对</th>
                  <th>方向</th>
                  <th>状态</th>
                  <th>风控</th>
                </tr>
              </thead>
              <tbody id="orderRows"></tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="grid-two">
        <article class="panel">
          <div class="panel-head">
            <h2>账户</h2>
          </div>
          <div class="stack">
            <div class="subtable">
              <h3>余额</h3>
              <div id="balanceRows" class="rows"></div>
            </div>
            <div class="subtable">
              <h3>持仓</h3>
              <div id="positionRows" class="rows"></div>
            </div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>策略运行</h2>
          </div>
          <div class="stack">
            <div class="subtable">
              <h3>信号</h3>
              <div id="signalRows" class="rows"></div>
            </div>
            <div class="subtable">
              <h3>绩效</h3>
              <div id="performanceRows" class="rows"></div>
            </div>
          </div>
        </article>
      </section>

      <section class="grid-two">
        <article class="panel">
          <div class="panel-head">
            <h2>数据快照</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>名称</th>
                  <th>市场</th>
                  <th>交易对</th>
                  <th>数量</th>
                  <th>缺口</th>
                </tr>
              </thead>
              <tbody id="snapshotRows"></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>合约数据</h2>
          </div>
          <div class="stack">
            <div class="subtable">
              <h3>资金费率</h3>
              <div id="fundingRows" class="rows"></div>
            </div>
            <div class="subtable">
              <h3>标记价格</h3>
              <div id="markRows" class="rows"></div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
